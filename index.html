  // 👇 ADD YOUR GOOGLE EMAIL TO THIS LIST 👇

      "rmty5506@gmail.com", 
      "sudiptobhattacharjee516@gmail.com",
      "YOUR.TESTING.EMAIL@gmail.com" // <--- Change this to your actual email
  ];

  const firebaseConfig = {
    apiKey: "AIzaSyCH1Vf9rxaMwCJZFBcSzKPP12EBbXGCbIU",
    authDomain: "deblevate.firebaseapp.com",
    projectId: "deblevate",
    storageBucket: "deblevate.firebasestorage.app",
    messagingSenderId: "475175725126",
    appId: "1:475175725126:web:387a318d4cccaf74ef4247",

    // (If you don't have one yet, this dummy URL will stop the crash)
    databaseURL: "https://deblevate-default-rtdb.firebaseio.com" 
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const provider = new GoogleAuthProvider();

  window.currentUserRef = null;

  document.getElementById('loginBtnUI').onclick = () => signInWithPopup(auth, provider);
  document.getElementById('loginBtnCenter').onclick = () => signInWithPopup(auth, provider);
  
  document.getElementById('logoutBtnUI').onclick = () => { 
      if(window.currentUserRef) { remove(window.currentUserRef); }
      signOut(auth); 
      if(window.plyrPlayer) window.plyrPlayer.stop(); 
  };

  onAuthStateChanged(auth, (user) => {
      if (user && window.allowedEmails.includes(user.email.toLowerCase())) {
          document.getElementById('loginBtnUI').style.display = 'none';
          document.getElementById('userInfo').style.display = 'flex';
          document.getElementById('userName').textContent = user.displayName;
          document.getElementById('userPic').src = user.photoURL;
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('main-app').style.display = 'block';
          renderAllCourses();
      } else {
          if(user) { alert("Access Denied! Your email is not whitelisted."); signOut(auth); }
          document.getElementById('loginBtnUI').style.display = 'flex';
          document.getElementById('userInfo').style.display = 'none';
          document.getElementById('login-screen').style.display = 'block';
          document.getElementById('main-app').style.display = 'none';
      }
  });

  // REALTIME REAL WORKSPACE VIEWER TRACKER
  window.trackRealViewers = function(courseKey) {
      if (!auth.currentUser) return;
      if (window.currentUserRef) { remove(window.currentUserRef); }

      const userId = auth.currentUser.uid;
      const courseViewersRef = ref(db, `live_viewers/${courseKey}`);
      window.currentUserRef = ref(db, `live_viewers/${courseKey}/${userId}`);

      set(window.currentUserRef, true).catch(err => console.warn("DB Set blocked (Check your databaseURL):", err));
      onDisconnect(window.currentUserRef).remove();

      onValue(courseViewersRef, (snapshot) => {
          const viewersData = snapshot.val();
          const realCount = viewersData ? Object.keys(viewersData).length : 1;
          const counterEl = document.getElementById('liveViewerCount');
          if(counterEl) counterEl.innerText = realCount;
      }, (error) => {
          console.log("Realtime Database restricted/error: Displaying local fallback tracking.", error);
          document.getElementById('liveViewerCount').innerText = "1";
      });
  };
</script>

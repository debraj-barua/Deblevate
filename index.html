<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deblevate's Dream Edtech</title>
    <style>
        :root {
            --bg-main: #0b0f19; --bg-card: #151b2b; --bg-nav: #070a13;
            --text-light: #f8fafc; --text-muted: #64748b;
            --accent-gold: #d4af37; --accent-gold-light: #fdf5a9; --accent-gold-dark: #aa771c; 
            --accent-blue: #2563eb;
            --color-physics: #00d2ff; --color-chemistry: #ff9f43; --color-math: #ff4757;
            --color-biology: #2ed573; --color-ict: #a55eea; --color-bangla: #00ced1; --color-english: #ff007f;
        }

        html { scroll-behavior: smooth; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: var(--bg-main); color: var(--text-light); }

        /* NAVBAR */
        header { background-color: var(--bg-nav); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .header-logo { display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .header-logo img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .brand-text-container { display: flex; flex-direction: column; }
        .brand-name { font-family: 'Times New Roman', Times, serif; font-size: 1.8rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; background: linear-gradient(to bottom, var(--accent-gold-light) 0%, var(--accent-gold) 50%, var(--accent-gold-dark) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; line-height: 1; }
        .brand-sub { font-size: 0.75rem; color: #cbd5e1; letter-spacing: 1.5px; margin-top: 4px; font-weight: 600; text-transform: uppercase; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center;}
        
        /* AUTH UI */
        .login-btn { background: #ea4335; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.95rem; transition: 0.3s; }
        .login-btn:hover { background: #d33426; box-shadow: 0 4px 15px rgba(234, 67, 53, 0.4); }
        .user-profile { display: flex; align-items: center; gap: 10px; }
        .user-profile img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent-gold); }
        .logout-btn { background: #1e293b; color: #f8fafc; border: 1px solid rgba(255,255,255,0.1); padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: 0.2s;}
        .logout-btn:hover { background: #ef4444; color: white; border-color: #ef4444;}
        #login-screen { text-align: center; padding: 10rem 2rem; }

        /* DASHBOARD */
        #main-app { display: none; } 
        #home-view { padding: 2.5rem 5%; max-width: 1400px; margin: 0 auto; }
        .hero-banner { padding: 0; border-radius: 20px; text-align: center; margin-bottom: 3rem; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: #0f172a; overflow: hidden; }
        .hero-banner img { width: 100%; height: auto; display: block; }
        .hero-motivation { padding: 1.5rem; background: rgba(15, 23, 42, 0.95); color: var(--text-light); font-style: italic; font-size: 1.1rem; border-top: 1px solid var(--accent-blue); line-height: 1.6; }
        .filters { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.8rem; margin-bottom: 3rem; }
        .filter-btn { background-color: #1e293b; color: #cbd5e1; border: 1px solid rgba(255,255,255,0.05); padding: 0.6rem 1.4rem; border-radius: 50px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.2); font-size: 0.9rem; }
        
        .filter-btn[data-target="physics"].active { background-color: var(--color-physics); color: #000; box-shadow: 0 0 15px rgba(0,210,255,0.4); border-color: var(--color-physics); }
        .filter-btn[data-target="chemistry"].active { background-color: var(--color-chemistry); color: #000; box-shadow: 0 0 15px rgba(255,159,67,0.4); border-color: var(--color-chemistry); }
        .filter-btn[data-target="math"].active { background-color: var(--color-math); color: #fff; box-shadow: 0 0 15px rgba(255,71,87,0.4); border-color: var(--color-math); }
        .filter-btn[data-target="biology"].active { background-color: var(--color-biology); color: #000; box-shadow: 0 0 15px rgba(46,213,115,0.4); border-color: var(--color-biology); }
        .filter-btn[data-target="ict"].active { background-color: var(--color-ict); color: #fff; box-shadow: 0 0 15px rgba(165,94,234,0.4); border-color: var(--color-ict); }
        .filter-btn[data-target="bangla"].active { background-color: var(--color-bangla); color: #000; box-shadow: 0 0 15px rgba(0,206,209,0.4); border-color: var(--color-bangla); }
        .filter-btn[data-target="english"].active { background-color: var(--color-english); color: #fff; box-shadow: 0 0 15px rgba(255,0,127,0.4); border-color: var(--color-english); }

        .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 2.5rem; }
        .course-card { background-color: var(--bg-card); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.03); transition: all 0.4s; cursor: pointer; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.3);}
        .course-card:hover { transform: translateY(-8px); border-color: var(--accent-blue); box-shadow: 0 15px 30px rgba(37,99,235,0.25); }
        
        .card-img-wrapper { position: relative; width: 100%; padding-top: 56.25%; background-color: #000; overflow: hidden; }
        .card-img-wrapper img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
        .course-card:hover .card-img-wrapper img { transform: scale(1.1); }
        
        .card-tags { position: absolute; bottom: 12px; left: 12px; display: flex; gap: 8px; flex-wrap: wrap;}
        .tag { padding: 0.35rem 0.9rem; border-radius: 8px; font-size: 0.75rem; font-weight: 800; color: white; letter-spacing: 0.5px; text-transform: uppercase; background: var(--accent-blue);}
        .card-content { padding: 1.5rem; background: #0f172a; }
        .card-title { font-size: 1.15rem; font-weight: 700; margin: 0 0 0.4rem 0; color: #fff; }
        .card-subtitle { font-size: 0.88rem; color: #94a3b8; margin: 0; }

        /* PLAYER VIEW */
        #player-view { display: none; max-width: 1400px; margin: 0 auto; padding: 1rem 2rem; }
        .back-btn { background: #1e293b; color: white; border: 1px solid rgba(255,255,255,0.05); padding: 0.6rem 1.4rem; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 1.5rem; transition: 0.2s;}
        .back-btn:hover { background: #334155; }
        
        .studio-container { display: flex; flex-direction: row; gap: 2rem; }
        .main-content { flex: 2; display: flex; flex-direction: column; }
        
        /* PERFECT NATIVE VIDEO AREA */
        .protected-video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 1.5rem; }
        .protected-video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        /* 🛠️ ADVANCED SMART SHIELD: 
           ভিডিওর ভেতরের টাইটেল, শেয়ার বাটন এবং মাঝখানের স্ক্রিন সম্পূর্ণ ব্লক করবে। 
           নিচের ১০% (bottom: 10%) ফাঁকা রাখা হয়েছে যাতে প্লে/পজ, সেটিংস, ফুলস্ক্রিন ঠিকমত কাজ করে। */
        .video-main-shield { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 90%; 
            z-index: 10; 
            background: transparent; 
            cursor: default; 
        }

        .video-info { background-color: var(--bg-card); padding: 1.8rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03); }
        .video-title { margin: 0 0 10px 0; font-size: 1.5rem; color: white; }
        
        /* Slide Segment */
        .slide-segment { margin-top: 2rem; background: var(--bg-card); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; display: none; }
        .slide-header { background: #0b0f19; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .slide-header h3 { margin: 0; color: var(--accent-blue); font-size: 1.1rem; }
        .download-btn { background: #22c55e; color: #000; padding: 0.5rem 1.2rem; border-radius: 6px; font-size: 0.9rem; font-weight: bold; text-decoration: none; transition: 0.3s; }
        .download-btn:hover { background: #16a34a; color: white; }
        .slide-frame-container { width: 100%; height: 600px; background: #000; }
        .slide-frame-container iframe { width: 100%; height: 100%; border: none; }

        /* Sidebar Playlist */
        .sidebar { flex: 1; background-color: var(--bg-card); border-radius: 12px; display: flex; flex-direction: column; max-height: 600px; }
        .sidebar-header { padding: 1.2rem; background-color: #0b0f19; border-radius: 12px 12px 0 0; }
        .video-list { overflow-y: auto; flex-grow: 1; padding: 0.6rem; }
        .video-item { display: flex; padding: 0.9rem; margin-bottom: 0.5rem; border-radius: 8px; cursor: pointer; background: #131c2e; color: #cbd5e1; align-items: center;}
        .video-item.active { background: rgba(37,99,235,0.15); border-left: 3px solid var(--accent-blue); color: white; }
        .video-index { margin-right: 12px; color: var(--accent-blue); font-size: 1.2rem; min-width: 20px;}

        @media (max-width: 900px) { .studio-container { flex-direction: column; } .slide-frame-container { height: 400px; } }
    </style>
</head>

<script>
// DATA STORAGE FOR INDIVIDUAL VIDEOS (Eikhane tumi tomar single video id gulo bosiye nibe!)
const courseData = {
    course1: {
        playlistBase: "PL49v1u8vZEOyjuamFhUp0cCJG1MiQbE-A",
        videos: [
            { title: "০১. ভৌত জগৎ ও পরিমাপ (Intro)", id: "tgbNymZ7vqY" },
            { title: "০২. HTML5 Advanced Crash Course", id: "dQw4w9WgXcQ" },
            { title: "০৩. Web Layout Planning & CSS", id: "PkZNo7MFOUg" },
            { title: "০৪. Responsive Media Queries", id: "2g811F776wA" }
        ]
    },
    course2: {
        playlistBase: "PL49v1u8vZEOy4ZcVE2eowg4Tx-05uSmlI",
        videos: [
            { title: "০১. React JS Ecosystem Intro", id: "Ke90Tje7VS0" },
            { title: "০২. Setup Environment & Vite", id: "VJ8v4SAs4BM" },
            { title: "০৩. Understanding Functional Components", id: "73_19A-YkZg" }
        ]
    },
    course3: {
        playlistBase: "PL49v1u8vZEOy3C6ykivVtxR5DQFUFL2Bn",
        videos: [
            { title: "০১. JavaScript Engine Masterclass", id: "W6NZfCO5SIk" },
            { title: "০২. Closures, Scopes and Hoisting", id: "8aGhZQkoFbQ" }
        ]
    }
};

// Function to load the course and its individual video items
function loadCourse() {
    const selectedCourse = document.getElementById("courseDropdown").value;
    const data = courseData[selectedCourse];
    const container = document.getElementById("videoListContainer");
    
    // Clear old list
    container.innerHTML = "";
    
    // Generate individual video item lists like HSC Crackers
    data.videos.forEach((video, index) => {
        const item = document.createElement("div");
        item.className = "video-item" + (index === 0 ? " active" : "");
        item.onclick = function() {
            // Remove active class from others
            document.querySelectorAll('.video-item').forEach(el => el.classList.remove('active'));
            // Add active to clicked item
            item.classList.add('active');
            // Change video player source
            setVideo(video.id, video.title);
        };
        
        // Pad zero for index numbers (01, 02...)
        const displayIndex = (index + 1) < 10 ? "0" + (index + 1) : (index + 1);
        
        item.innerHTML = 
            <div class="video-index">${displayIndex}</div>
            <div class="video-text-details">
                <p class="video-item-title">${video.title}</p>
            </div>
        ;
        container.appendChild(item);
    });

    // Load first video by default
    if(data.videos.length > 0) {
        setVideo(data.videos[0].id, data.videos[0].title);
    }
}

function setVideo(id, title) {
    const player = document.getElementById("studioPlayer");
    player.src = "https://www.youtube.com/embed/" + id + "?rel=0";
    document.getElementById("mainVideoTitle").innerText = title;
}

// Initial Run
window.onload = function() {
    loadCourse();
};
</script>

</body>

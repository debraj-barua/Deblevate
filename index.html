<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deblevate | Elevate Your Learning</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <style>
        :root {
            --bg-main: #06101e; 
            --bg-card: #111b2e;
            --bg-nav: #040b14;
            --accent-blue: #1e62d0; 
            --accent-gold: #d4af37; 
            --accent-gold-light: #fdf5a9; 
            --accent-gold-dark: #aa771c; 
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --plyr-color-main: #1e62d0; 
        }

        html { scroll-behavior: smooth; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-main);
            color: var(--text-light);
        }

        /* =========================================
           NAVBAR & LOGO STYLING
           ========================================= */
        header {
            background-color: var(--bg-nav);
            padding: 1rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #1f2937;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        .header-logo {
            display: flex; align-items: center; gap: 15px; text-decoration: none;
        }
        
        .header-logo img {
            width: 50px; height: 50px; border-radius: 8px; object-fit: cover;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .brand-text-container { display: flex; flex-direction: column; }
        
        .brand-name {
            font-family: 'Times New Roman', Times, serif; 
            font-size: 1.8rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
            background: linear-gradient(to bottom, var(--accent-gold-light) 0%, var(--accent-gold) 50%, var(--accent-gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0; line-height: 1;
        }
        
        .brand-sub {
            font-size: 0.75rem; color: #cbd5e1; letter-spacing: 1.5px; margin-top: 4px; font-weight: 600; text-transform: uppercase;
        }

        .nav-links { display: flex; gap: 2rem; }
        .nav-links a { color: var(--text-light); text-decoration: none; font-weight: 600; font-size: 1rem; transition: 0.3s; padding: 0.5rem 1rem; border-radius: 8px;}
        .nav-links a:hover, .nav-links a.active { background-color: rgba(212, 175, 55, 0.1); color: var(--accent-gold); }

        /* =========================================
           HOME VIEW (DASHBOARD)
           ========================================= */
        #home-view { padding: 2rem 5%; max-width: 1400px; margin: 0 auto; }

        .hero-banner {
            background: linear-gradient(rgba(6, 16, 30, 0.8), rgba(6, 16, 30, 0.9)), url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=2000&auto=format&fit=crop') center/cover;
            padding: 4rem 2rem; border-radius: 16px; text-align: center; margin-bottom: 2rem; border: 1px solid #1f2937; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .hero-banner h1 { font-size: 2.5rem; margin: 0 0 1rem 0; color: var(--accent-gold); font-family: 'Times New Roman', serif; letter-spacing: 1px;}
        .hero-banner p { font-size: 1.1rem; color: var(--text-muted); margin: 0; }

        .filters { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .filter-btn {
            background-color: transparent; color: var(--text-light); border: 1px solid var(--accent-blue); padding: 0.5rem 1.5rem;
            border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .filter-btn.active { background-color: var(--accent-blue); color: white; border-color: var(--accent-blue);}
        .filter-btn.gold { background-color: transparent; border-color: var(--accent-gold); color: var(--accent-gold); }
        .filter-btn.gold:hover { background-color: var(--accent-gold); color: #000; }

        .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }

            background-color: var(--bg-card); border-radius: 12px; overflow: hidden;
            border: 1px solid #1f2937; transition: transform 0.3s, box-shadow 0.3s; cursor: pointer;

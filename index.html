<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deblevate's Dream Edtech | Premium</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        :root {
            --bg-main: #0a0514; 
            --bg-card: rgba(30, 15, 45, 0.65); 
            --bg-nav: rgba(10, 5, 20, 0.85);
            --text-light: #f8fafc; 
            --text-muted: #a78bfa;
            --accent-purple: #9333ea;
            --accent-purple-light: #c084fc;
            --accent-pink: #ec4899;
            --accent-cyan: #06b6d4;
            --color-physics: #ec4899;
            --color-chemistry: #fbbf24;
            --color-math: #f97316;
            --color-biology: #10b981;
            --color-ict: #a855f7;
            --color-bangla: #0ea5e9;
            --color-english: #06b6d4;
            --plyr-color-main: var(--accent-purple-light);
        }

        * { user-select: none; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: var(--bg-main); color: var(--text-light); overflow-x: hidden; }

        .bg-animated-shapes { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; overflow: hidden; background: var(--bg-main); }
        .shape { position: absolute; border-radius: 50%; filter: blur(140px); opacity: 0.25; animation: float 18s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        .shape1 { width: 45vw; height: 45vw; background: var(--accent-purple); top: -15%; left: -5%; }
        .shape2 { width: 40vw; height: 40vw; background: var(--accent-pink); bottom: -10%; right: -5%; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(-20px, 30px) scale(0.95); } }

        header { background-color: var(--bg-nav); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(147, 51, 234, 0.4); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(25px); }
        .brand-name { font-size: 2rem; font-weight: 900; background: linear-gradient(to right, #ffffff, var(--accent-purple-light), var(--accent-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        
        .login-btn { background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink)); color: white; border: none; padding: 0.7rem 1.8rem; border-radius: 10px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .user-profile { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); padding: 6px 18px 6px 6px; border-radius: 50px; border: 1px solid rgba(147,51,234,0.5); }
        .user-profile img { width: 40px; height: 40px; border-radius: 50%; }
        
        #login-screen, #identity-setup-overlay, #course-auth-overlay { text-align: center; padding: 12rem 2rem; position: relative; z-index: 10; }
        #identity-setup-overlay, #course-auth-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10, 5, 20, 0.98); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
        .auth-card { background: rgba(25, 10, 40, 0.6); border: 2px solid var(--accent-purple); padding: 3rem; border-radius: 24px; max-width: 450px; width: 90%; }
        
        #main-app { display: none; position: relative; z-index: 10; } 
        #home-view { padding: 3rem 5%; max-width: 1400px; margin: 0 auto; }
        .filters { display: flex; flex-wrap: wrap; justify-content: center; gap: 1.2rem; margin-bottom: 4rem; }
        .filter-btn { background: rgba(30, 15, 45, 0.6); color: var(--text-muted); border: 1px solid rgba(147,51,234,0.3); padding: 0.8rem 1.8rem; border-radius: 14px; cursor: pointer; }
        .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 3rem; }
        .course-card { background: rgba(25, 10, 40, 0.45); border-radius: 20px; overflow: hidden; border: 1px solid rgba(147,51,234,0.25); cursor: pointer; display: none; }
        
        #player-view { display: none; max-width: 1550px; margin: 0 auto; padding: 2rem 5%; }
        .studio-container { display: flex; flex-direction: row; gap: 2.5rem; align-items: flex-start; }
        .main-content { flex: 2.4; display: flex; flex-direction: column; }
        .sidebar { flex: 1.2; background: rgba(25,10,40,0.7); border-radius: 20px; display: flex; flex-direction: column; height: 700px; }
        .chat-messages { flex-grow: 1; padding: 1.5rem; overflow-y: auto; }
        .chat-msg { background: rgba(147,51,234,0.1); padding: 10px 14px; border-radius: 12px; margin-bottom: 10px; }
        
        .reaction-center { display: flex; gap: 12px; margin-top: 15px; }
        .reaction-btn { background: rgba(147, 51, 234, 0.15); border: 2px solid rgba(147, 51, 234, 0.4); padding: 8px 16px; border-radius: 20px; color: #fff; cursor: pointer; }
        .slide-frame-container { width: 100%; height: 700px; background: #000; }
        .slide-frame-container iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="identity-setup-overlay">
    <div class="auth-card">
        <h3 style="color: #fff; margin: 0;">CHOOSE IDENTITY</h3>
        <input type="text" id="chosenIdentityInput" placeholder="Enter Your Real Name..." style="width: 100%; padding: 10px; margin: 20px 0;">
        <button class="login-btn" onclick="submitCustomIdentity()">Confirm Identity</button>
    </div>
</div>

<div id="course-auth-overlay">
    <div class="auth-card">
        <h3 style="color: #fff; margin: 0;">SECURE GATEWAY</h3>
        <p id="course-auth-status" style="color: var(--accent-purple-light);">Verifying tokens...</p>
    </div>
</div>

<header>
    <div class="brand-text-container">
        <span class="brand-name">DEBLEVATE</span>
    </div>
    <div class="nav-links">
        <button id="loginBtnUI" class="login-btn">Google Login</button>
        <div id="userInfo" class="user-profile" style="display: none;">
            <img id="userPic" src="" alt="User">
            <div>
                <div id="userName" style="color: var(--accent-cyan); font-weight: bold;"></div>
                <button id="logoutBtnUI" style="background: transparent; border: none; color: red; cursor: pointer;">Logout</button>
            </div>
        </div>
    </div>
</header>

<div id="login-screen">
    <h2>Access Restricted</h2>
    <button id="loginBtnCenter" class="login-btn" style="margin: 0 auto;">Authenticate Now</button>
</div>

<div id="main-app">
    <div id="home-view">
        <div class="filters" id="subject-filters">
            <button class="filter-btn active" onclick="filterSubject('physics', this)">Physics</button>
            <button class="filter-btn" onclick="filterSubject('chemistry', this)">Chemistry</button>
            <button class="filter-btn" onclick="filterSubject('math', this)">Math</button>
        </div>
        <div class="course-grid" id="courseGridContainer"></div>
    </div>

    <div id="player-view">
        <button onclick="showHome()" style="margin-bottom: 20px; padding: 10px; cursor: pointer;">← Back</button>
        <div class="studio-container">
            <div class="main-content">
                <div id="studioPlayer" data-plyr-provider="youtube" data-plyr-embed-id=""></div>
                <h2 id="mainVideoTitle" style="color: #fff; margin-top: 20px;">Loading...</h2>
                <div class="reaction-center">
                    <button class="reaction-btn" onclick="triggerReaction('like')">👍 <span id="like-count">0</span></button>
                    <button class="reaction-btn" onclick="triggerReaction('love')">❤️ <span id="love-count">0</span></button>
                </div>
                <div id="reaction-names-display" style="color: var(--accent-cyan); margin-top: 10px;"></div>
                <div class="slide-frame-container" id="slideSegment" style="display:none; margin-top: 20px;">
                    <iframe id="slideIframe" src="" allowfullscreen="true"></iframe>
                </div>
            </div>
            <div class="sidebar">
                <div class="chat-messages" id="chatMessagesBox"></div>
                <div style="padding: 10px; display: flex; gap: 10px;">
                    <input type="text" id="chatInput" placeholder="Type a message..." style="flex-grow: 1; padding: 10px;">
                    <button onclick="handleChatSubmit()" style="padding: 10px; cursor: pointer;">Send</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import { getDatabase, ref, set, onValue, onDisconnect, remove, push, onChildAdded, onChildRemoved, off } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

  window.allowedEmails = ["debrajbarua8@gmail.com"];

  const firebaseConfig = {
    apiKey: "AIzaSyCH1Vf9rxaMwCJZFBcSzKPP12EBbXGCbIU",
    authDomain: "deblevate.firebaseapp.com",
    projectId: "deblevate",
    storageBucket: "deblevate.firebasestorage.app",
    messagingSenderId: "475175725126",
    appId: "1:475175725126:web:387a318d4cccaf74ef4247",
    databaseURL: "https://deblevate-default-rtdb.firebaseio.com" 
  };

  const app = initializeApp(firebaseConfig);
  window.auth = getAuth(app);
  window.db = getDatabase(app);
  const provider = new GoogleAuthProvider();

  window.currentCourseKey = null;
  window.currentVideoId = null;
  window.globalIdentityName = "";

  document.getElementById('loginBtnUI').onclick = () => signInWithPopup(window.auth, provider);
  document.getElementById('loginBtnCenter').onclick = () => signInWithPopup(window.auth, provider);
  document.getElementById('logoutBtnUI').onclick = () => { signOut(window.auth); };

  onAuthStateChanged(window.auth, (user) => {
      if (user && window.allowedEmails.includes(user.email.toLowerCase())) {
          onValue(ref(window.db, `users_metadata/${user.uid}/custom_name`), (snapshot) => {
              if (snapshot.val()) {
                  window.globalIdentityName = snapshot.val();
                  completeSystemInitialization(user);
              } else {
                  document.getElementById('identity-setup-overlay').style.display = 'flex';
              }
          }, { onlyOnce: true });
      } else {
          document.getElementById('loginBtnUI').style.display = 'flex';
          document.getElementById('userInfo').style.display = 'none';
          document.getElementById('login-screen').style.display = 'block';
          document.getElementById('main-app').style.display = 'none';
      }
  });

  window.submitCustomIdentity = function() {
      const nameText = document.getElementById('chosenIdentityInput').value.trim();
      if(nameText) {
          set(ref(window.db, `users_metadata/${window.auth.currentUser.uid}/custom_name`), nameText).then(() => {
              window.globalIdentityName = nameText;
              document.getElementById('identity-setup-overlay').style.display = 'none';
              completeSystemInitialization(window.auth.currentUser);
          });
      }
  };

  function completeSystemInitialization(user) {
      document.getElementById('loginBtnUI').style.display = 'none';
      document.getElementById('userInfo').style.display = 'flex';
      document.getElementById('userName').textContent = window.globalIdentityName;
      document.getElementById('userPic').src = user.photoURL;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main-app').style.display = 'block';
      renderAllCourses();
  }

  window.handleChatSubmit = function() {
      const text = document.getElementById('chatInput').value.trim();
      if (text && window.auth.currentUser) {
          push(ref(window.db, `comments/${window.currentCourseKey}/${window.currentVideoId}`), {
              uid: window.auth.currentUser.uid,
              author: window.globalIdentityName,
              text: text
          });
          document.getElementById('chatInput').value = "";
      }
  };

  window.requestCommentDeletion = function(commentId) {
      if(confirm("Delete this comment?")) {
          remove(ref(window.db, `comments/${window.currentCourseKey}/${window.currentVideoId}/${commentId}`));
      }
  };

  window.triggerReaction = function(type) {
      set(ref(window.db, `reactions/${window.currentCourseKey}/${window.currentVideoId}/${window.auth.currentUser.uid}`), { type: type, name: window.globalIdentityName });
  };
</script>

<script>
const courseData = {
    course1: { sub: "physics", title: "Physics Demo", img: "lhC3bVV_g9M", videos: [{ title: "Class 1", id: "lhC3bVV_g9M", sheet: "" }] }
};

function renderAllCourses() {
    const grid = document.getElementById('courseGridContainer');
    grid.innerHTML = "";
    Object.keys(courseData).forEach(key => {
        let c = courseData[key];
        grid.innerHTML += `<div class="course-card" data-subject="${c.sub}" style="display:block;" onclick="openCourse('${key}')"><div class="card-content"><h3 class="card-title">${c.title}</h3></div></div>`;
    });
}

function showHome() {
    document.getElementById('home-view').style.display = 'block';
    document.getElementById('player-view').style.display = 'none';
}

function filterSubject(sub, btn) {
    document.querySelectorAll('.course-card').forEach(c => { c.style.display = (c.getAttribute('data-subject') === sub) ? 'block' : 'none'; });
}

function openCourse(key) {
    window.currentCourseKey = key;
    document.getElementById('home-view').style.display = 'none';
    document.getElementById('player-view').style.display = 'block';
    setVideo(courseData[key].videos[0].id, courseData[key].videos[0].title, courseData[key].videos[0].sheet);
}

function setVideo(id, title, sheetLink) {
    window.currentVideoId = id;
    document.getElementById("mainVideoTitle").innerText = title;
    
    if(!window.plyrPlayer) {
        document.getElementById('studioPlayer').setAttribute('data-plyr-embed-id', id);
        window.plyrPlayer = new Plyr('#studioPlayer');
    } else {
        window.plyrPlayer.source = { type: 'video', sources: [{ src: id, provider: 'youtube' }] };
    }
}
</script>
</body>
</html>

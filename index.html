<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deblevate's Dream Edtech</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #151b2b;
            --bg-nav: #070a13;
            --accent-blue: #2563eb;
            --accent-purple: #7c3aed;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --accent-gold: #d4af37; 
            --accent-gold-light: #fdf5a9; 
            --accent-gold-dark: #aa771c; 
        }

        html { scroll-behavior: smooth; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-main);
            color: var(--text-light);
        }

        /* NAVBAR STYLING */
        header {
            background-color: var(--bg-nav);
            padding: 1rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #1f2937;
            position: sticky; top: 0; z-index: 100;
        }
        .header-logo {
            display: flex; align-items: center; gap: 15px; text-decoration: none;
        }
        .header-logo img {
            width: 50px; height: 50px; border-radius: 8px; object-fit: cover;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }
        .brand-text-container { display: flex; flex-direction: column; }
        .brand-name {
            font-family: 'Times New Roman', Times, serif; 
            font-size: 1.8rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
            background: linear-gradient(to bottom, var(--accent-gold-light) 0%, var(--accent-gold) 50%, var(--accent-gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0; line-height: 1;
        }
        .brand-sub {
            font-size: 0.75rem; color: #cbd5e1; letter-spacing: 1.5px; margin-top: 4px; font-weight: 600; text-transform: uppercase;
        }
        
        .nav-links { display: flex; gap: 2rem; }
        .nav-links a { color: var(--text-light); text-decoration: none; font-weight: 600; font-size: 1rem; transition: 0.3s; padding: 0.5rem 1rem; border-radius: 8px;}
        .nav-links a:hover, .nav-links a.active { background-color: var(--accent-blue); color: white; }

        /* DASHBOARD VIEW */
        #home-view { padding: 2rem 5%; max-width: 1400px; margin: 0 auto; }
        .hero-banner {
            background: linear-gradient(rgba(11, 15, 25, 0.7), rgba(11, 15, 25, 0.7)), url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=2000&auto=format&fit=crop') center/cover;
            padding: 4rem 2rem; border-radius: 16px; text-align: center; margin-bottom: 2rem; border: 1px solid #1f2937; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .hero-banner h1 { font-size: 2.5rem; margin: 0 0 1rem 0; color: white; }
        .hero-banner p { font-size: 1.1rem; color: var(--text-muted); margin: 0; }

        .filters { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .filter-btn {
            background-color: white; color: #0b0f19; border: none; padding: 0.5rem 1.5rem;
            border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .filter-btn.active { background-color: var(--accent-blue); color: white; }
        .filter-btn.purple { background-color: var(--accent-purple); color: white; }

        /* Course Grid */
        .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
        .course-card {
            background-color: var(--bg-card); border-radius: 12px; overflow: hidden;
            border: 1px solid #1f2937; transition: transform 0.3s, box-shadow 0.3s; cursor: pointer;
        }
        .course-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.6); border-color: var(--accent-blue); }
        
        .card-img-wrapper { position: relative; width: 100%; padding-top: 56.25%; background-color: #000; }
        .card-img-wrapper img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .card-tags { position: absolute; bottom: 10px; left: 10px; display: flex; gap: 10px; }
        .tag { padding: 0.3rem 0.8rem; border-radius: 6px; font-size: 0.8rem; font-weight: bold; color: white; }
        .tag-blue { background-color: var(--accent-blue); }
        .tag-purple { background-color: var(--accent-purple); }

        .card-content { padding: 1.5rem; text-align: center; }
        .card-title { font-size: 1.1rem; font-weight: bold; margin: 0 0 0.5rem 0; line-height: 1.4; }
        .card-subtitle { font-size: 0.9rem; color: var(--text-muted); margin: 0; }

        /* PLAYER VIEW */
        #player-view { display: none; max-width: 1400px; margin: 0 auto; padding: 1rem 2rem; }
        .back-bar { margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { background: #1f2937; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { background: var(--accent-blue); }

        .studio-container { display: flex; flex-direction: row; gap: 2rem; }
        .main-content { flex: 2; display: flex; flex-direction: column; }
        
        /* Modified Video Wrapper to hold API player */
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid var(--accent-blue);}
        .video-wrapper iframe, .video-wrapper div { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .video-info { margin-top: 1.5rem; background-color: var(--bg-card); padding: 1.5rem; border-radius: 12px; border: 1px solid #1f2937; }
        .video-title { margin: 0 0 0.5rem 0; font-size: 1.4rem; color: white; line-height: 1.4; }
        
        .tag-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; margin-top: 1rem; }
        .instructor-tag { display: inline-block; background: rgba(37, 99, 235, 0.2); color: #60a5fa; padding: 0.4rem 0.8rem; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .sheet-btn { display: inline-block; background-color: #22c55e; color: #000; padding: 0.4rem 1rem; border-radius: 6px; font-size: 0.9rem; font-weight: bold; text-decoration: none; transition: 0.3s; }
        .sheet-btn:hover { background-color: #16a34a; color: white; }

        /* 💡 NEW: External Custom Controls Styling */
        .custom-controls {
            display: flex; align-items: center; gap: 12px; margin-top: 15px; padding-top: 15px;
            border-top: 1px solid #1f2937; flex-wrap: wrap;
        }
        .control-btn {
            background-color: var(--bg-main); color: var(--text-light); border: 1px solid var(--accent-blue);
            padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 0.85rem;
        }
        .control-btn:hover { background-color: var(--accent-blue); }
        .volume-container { display: flex; align-items: center; gap: 8px; margin-left: auto;}
        .volume-slider {
            -webkit-appearance: none; width: 100px; height: 5px; background: #1f2937; border-radius: 3px; outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent-blue); cursor: pointer;
        }

        .sidebar { flex: 1; background-color: var(--bg-card); border-radius: 12px; border: 1px solid #1f2937; display: flex; flex-direction: column; max-height: 550px; }
        .sidebar-header { padding: 1.2rem; background-color: #0f131f; border-radius: 12px 12px 0 0; border-bottom: 1px solid #1f2937; }
        .sidebar-header h3 { margin: 0; font-size: 1.1rem; color: var(--text-light); }
        .video-list { overflow-y: auto; flex-grow: 1; padding: 0.5rem; }
        
        .video-item { display: flex; align-items: center; padding: 0.8rem 1rem; margin-bottom: 0.5rem; border-radius: 8px; cursor: pointer; transition: 0.2s; background-color: #1a2235; border: 1px solid transparent;}
        .video-item:hover { background-color: #252f48; }
        .video-item.active { background-color: rgba(37, 99, 235, 0.15); border-color: var(--accent-blue); }
        .video-index { font-size: 0.9rem; font-weight: bold; color: #60a5fa; margin-right: 1rem; min-width: 25px; }
        .video-item-title { font-size: 0.95rem; font-weight: 600; margin: 0; color: white; line-height: 1.3;}

        @media (max-width: 900px) {
            .studio-container { flex-direction: column; }
            .nav-links { display: none; }
            .volume-container { margin-left: 0; width: 100%; justify-content: flex-start; margin-top: 5px;}
        }
    </style>
</head>

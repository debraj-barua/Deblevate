<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deblevate | Physics MCQ Boost</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --sidebar-bg: #1f2937;
            --accent-color: #22c55e;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        html { scroll-behavior: smooth; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* Navbar */
        header {
            background-color: #070a13;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f2937;
        }
        .logo { font-size: 1.6rem; font-weight: 800; color: white; text-decoration: none; }
        .logo span { color: var(--accent-color); }

        /* Dropdown Selector Bar */
        .top-bar {
            background-color: var(--card-bg);
            padding: 1rem 5%;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 1px solid #1f2937;
        }
        .top-bar label { font-weight: bold; color: var(--text-main); }
        .course-select {
            padding: 0.6rem 1.2rem; background-color: #1f2937; color: white;
            border: 1px solid #374151; border-radius: 6px; font-size: 1rem; cursor: pointer;
            width: 100%; max-width: 400px;
        }

        /* Main Studio Layout */
        .studio-container {
            display: flex; flex-direction: row; max-width: 1400px;
            margin: 2rem auto; padding: 0 2rem; gap: 2rem;
        }

        /* Left Side: Video Player */
        .main-content { flex: 2; display: flex; flex-direction: column; }
        .video-wrapper {
            position: relative; padding-bottom: 56.25%; height: 0;
            border-radius: 12px; overflow: hidden; background: #000;
        }
        .video-wrapper iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }
        .video-info {
            margin-top: 1.5rem; background-color: var(--card-bg);
            padding: 1.5rem; border-radius: 12px; border: 1px solid #1f2937;
        }
        .video-title { margin: 0 0 0.5rem 0; font-size: 1.4rem; color: white; line-height: 1.4; }
        .instructor-tag {
            display: inline-block; background: rgba(34, 197, 94, 0.1);
            color: var(--accent-color); padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85rem; font-weight: bold; margin-top: 0.5rem;
        }

        /* Right Side: Scrollable List */
        .sidebar {
            flex: 1; background-color: var(--card-bg); border-radius: 12px;
            border: 1px solid #1f2937; display: flex; flex-direction: column; max-height: 550px;
        }
        .sidebar-header {
            padding: 1.2rem; background-color: #172237;
            border-top-left-radius: 12px; border-top-right-radius: 12px; border-bottom: 1px solid #1f2937;
        }
        .sidebar-header h3 { margin: 0; font-size: 1.1rem; color: var(--accent-color); }
        .video-list { overflow-y: auto; flex-grow: 1; padding: 0.5rem; }
        
        .video-item {
            display: flex; align-items: center; padding: 0.8rem 1rem; margin-bottom: 0.5rem;
            border-radius: 8px; cursor: pointer; transition: background 0.2s; background-color: #171e2e;
        }
        .video-item:hover { background-color: #242f47; }
        .video-item.active { background-color: rgba(34, 197, 94, 0.15); border: 1px solid var(--accent-color); }
        .video-index { font-size: 0.9rem; font-weight: bold; color: var(--accent-color); margin-right: 1rem; min-width: 25px; }
        .video-item-title { font-size: 0.95rem; font-weight: 600; margin: 0; color: white; line-height: 1.3;}

        @media (max-width: 768px) {
            .studio-container { flex-direction: column; padding: 0 1rem; }
            .top-bar { flex-direction: column; align-items: flex-start; }
            .course-select { width: 100%; }
            .video-title { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">Deble<span>vate Studio</span></a>
</header>

<div class="top-bar">
    <label for="courseDropdown">Select Active Course:</label>
    <select id="courseDropdown" class="course-select" onchange="loadCourse()">
        <!-- 💡 ড্রপডাউনে তোমার কোর্সের আসল নামগুলো -->
        <option value="course1">Physics 1st Paper MCQ Boost</option>
        <option value="course2">Physics 2nd Paper MCQ Boost</option>
    </select>
</div>

<div class="studio-container">
    <div class="main-content">
        <div class="video-wrapper">
            <iframe id="studioPlayer" src="" allowfullscreen></iframe>
        </div>
        <div class="video-info">
            <h2 id="mainVideoTitle" class="video-title">Loading Lesson...</h2>
            <span class="instructor-tag">LEAD INSTRUCTOR: Debraj Barua</span>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <h3>CLASS PLAYLIST</h3>
        </div>
        <div id="videoListContainer" class="video-list">
            <!-- Videos will load here -->
        </div>
    </div>
</div>

<script>
// =========================================================================
// 🛑 ভিডিও এড বা রিমুভ করার জায়গা (তোমার ডেটাবেস) 🛑
// =========================================================================
const courseData = {
    
    // কোর্স ১: Physics 1st Paper MCQ Boost
    course1: {
        videos: [
            { title: "অধ্যায় ১: ভৌতজগৎ ও পরিমাপ", id: "xYFnKAbm8lY" },
            { title: "অধ্যায় ২: ভেক্টর", id: "hPoEUHtpfm8" },
            { title: "অধ্যায় ৩: গতিবিদ্যা", id: "HUtcNV8VjW4" },
            { title: "অধ্যায় ৪: নিউটনীয় বলবিদ্যা", id: "tni_iSOPZOg" },
            { title: "অধ্যায় ৫: কাজ, শক্তি ও ক্ষমতা", id: "H8OmfUSJXTA" },
            { title: "অধ্যায় ৬: মহাকর্ষ ও অভিকর্ষ", id: "KZb--LSkico" },
            { title: "অধ্যায় ৭: পদার্থের গাঠনিক ধর্ম", id: "gMcfrDdtoFU" },
            { title: "অধ্যায় ৮: পর্যাবৃত্ত গতি", id: "GrIGp_KkGfs" },
            { title: "অধ্যায় ৯: তরঙ্গ", id: "z-sq1FI52F4" },
            { title: "অধ্যায় ১০: আদর্শ গ্যাস ও গ্যাসের গতি তত্ত্ব", id: "ZuquDb_oBJk" }
        ]
    },

    // কোর্স ২: Physics 2nd Paper MCQ Boost
    course2: {
        videos: [
            { title: "অধ্যায় ১: তাপগতিবিদ্যা", id: "Mte0En3e-TQ" },
            { title: "অধ্যায় ২: স্থির তড়িৎ", id: "qFB1T_x3pEU" },
            { title: "অধ্যায় ৩: চল তড়িৎ", id: "jBz4518XC7Y" },
            { title: "অধ্যায় ৪: তড়িতের চৌম্বক ক্রিয়া ও চুম্বকত্ব", id: "vqEc9y5OMQw" },
            { title: "অধ্যায় ৫: তাড়িতচৌম্বক আবেশ ও পরিবর্তী প্রবাহ", id: "mbH0BSv5MAY" },
            { title: "অধ্যায় ৬: জ্যামিতিক আলোকবিজ্ঞান", id: "iNn79I5_RkU" },
            { title: "অধ্যায় ৭: ভৌত আলোকবিজ্ঞান", id: "xYFnKAbm8lY" },
            { title: "অধ্যায় ৮: আধুনিক পদার্থবিজ্ঞানের সূচনা", id: "QmBkHQoXYgk" },
            { title: "অধ্যায় ৯: পরমাণুর মডেল ও নিউক্লিয়ার পদার্থবিজ্ঞান", id: "x3pN3lHvXE4" },
            { title: "অধ্যায় ১০: সেমিকন্ডাক্টর ও ইলেকট্রনিক্স", id: "6nGv5Ta3AW4" },
            { title: "অধ্যায় ১১: জ্যোতির্বিজ্ঞান", id: "b4Sxz3Cst68" }
        ]
    }
};
// =========================================================================
// 🛑 এর নিচের কোনো কোড এডিট করার দরকার নেই 🛑
// =========================================================================

function loadCourse() {
    const selectedCourse = document.getElementById("courseDropdown").value;
    const data = courseData[selectedCourse];
    const container = document.getElementById("videoListContainer");
    container.innerHTML = "";
    
    data.videos.forEach((video, index) => {
        const item = document.createElement("div");
        item.className = "video-item" + (index === 0 ? " active" : "");
        item.onclick = function() {
            document.querySelectorAll('.video-item').forEach(el => el.classList.remove('active'));
            item.classList.add('active');
            setVideo(video.id, video.title);
        };
        const displayIndex = (index + 1) < 10 ? "0" + (index + 1) : (index + 1);
        item.innerHTML = `<div class="video-index">${displayIndex}</div><div class="video-text-details"><p class="video-item-title">${video.title}</p></div>`;
        container.appendChild(item);
    });

    if(data.videos.length > 0) {
        setVideo(data.videos[0].id, data.videos[0].title);
    }
}

function setVideo(id, title) {
    document.getElementById("studioPlayer").src = "https://www.youtube.com/embed/" + id + "?rel=0";
    document.getElementById("mainVideoTitle").innerText = title;
}
window.onload = loadCourse;
</script>

</body>
</html>
